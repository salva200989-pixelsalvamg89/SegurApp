name: Build SegurApp APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar cÃ³digo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Preparar carpeta www
        run: |
          mkdir -p www
          cp index.html app.js sw.js manifest.json www/
          cp -r icons www/
          node get-libs.js
          cp -r lib www/

      - name: Instalar Capacitor
        run: npm install

      - name: Inicializar Capacitor
        run: npx cap init "SegurApp" "com.salvadormg.segurapp" --web-dir www

      - name: AÃ±adir Android
        run: npx cap add android

      - name: Sincronizar
        run: npx cap sync android

      - name: Parchear MainActivity
        run: |
          mkdir -p android/app/src/main/java/com/salvadormg/segurapp
          cat > android/app/src/main/java/com/salvadormg/segurapp/MainActivity.java << 'JAVA'
          package com.salvadormg.segurapp;
          import android.os.Bundle;
          import android.Manifest;
          import android.os.Build;
          import androidx.core.app.ActivityCompat;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
            private static final int PERM_CODE = 100;
            @Override
            public void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                ActivityCompat.requestPermissions(this, new String[]{
                  Manifest.permission.READ_MEDIA_IMAGES,
                  Manifest.permission.READ_MEDIA_VIDEO,
                  Manifest.permission.CAMERA
                }, PERM_CODE);
              } else {
                ActivityCompat.requestPermissions(this, new String[]{
                  Manifest.permission.READ_EXTERNAL_STORAGE,
                  Manifest.permission.WRITE_EXTERNAL_STORAGE,
                  Manifest.permission.CAMERA
                }, PERM_CODE);
              }
            }
            @Override
            public void onBackPressed() {
              moveTaskToBack(true);
            }
          }
          JAVA

      - name: Permisos AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n</manifest>|' $MANIFEST

      - name: Permisos Gradle
        run: chmod +x android/gradlew

      - name: Construir APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: SegurApp-v2.0
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
