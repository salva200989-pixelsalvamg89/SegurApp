      - nombre: Permisos AndroidManifest
        correr: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>| <uses-permission android:name="android.permission.CAMERA" />\n <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n <uses-permission android:name="android.permission.VIBRATE" />\n</manifest>|' $MANIFEST

      - nombre: Permisos Gradle
        ejecutar: chmod +x android/gradlew

      - nombre: Construir APK
        correr: |
          CD Android
          ./gradlew assembleDebug --no-daemon

      - nombre: Subir APK
        Usos: acciones/cargar-artefacto@v4
        con:
          nombre: SegurApp-v2.0
          Ruta: android/app/build/outputs/apk/debug/app-debug.apk
          días de retención: 30
