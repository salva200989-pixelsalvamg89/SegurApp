nombre: Build SegurApp APK

en:
  empujar:
    ramas: [ principal ]
  flujo_de_trabajo:

empleos:
  construir:
    runs-on: ubuntu-latest

    pasos:
      - nombre: Descargar código
        Usos: acciones/checkout@v4

      - nombre: Instalar Node.js
        usos: actions/setup-node@v4
        con:
          versión del nodo: '20'

      - nombre: Instalar Java 17
        Usos: actions/setup-java@v4
        con:
          versión de Java: '17'
          distribución: 'temurin'

      - nombre: Preparar carpeta www
        correr: |
          mkdir -p www
          cp index.html app.js sw.js manifest.json www/
          cp -r iconos www/
          node get-libs.js
          cp -r lib www/

      - nombre: Instalar condensador
        ejecutar: npm install

      - nombre: Inicializar Capacitor
        ejecutar: npx cap init "SegurApp" "com.salvadormg.segurapp" --web-dir www

      - nombre: AÃ±adir Android
        ejecutar: npx cap agregar android

      - nombre: Sincronizar
        ejecutar: sincronización de capacidad npx android

      - nombre: Crear complemento nativo NativeStorage
        correr: |
          mkdir -p android/app/src/main/java/com/salvadormg/segurapp
          
          #Plugin Java que guarda en Android/data/com.salvadormg.segurapp/files/SegurApp/datos.json
          gato > android/app/src/main/java/com/salvadormg/segurapp/NativeStoragePlugin.java << 'JAVA'
paquete com.salvadormg.segurapp;

import android.content.Context;
import android.util.Log;
import com.getcapacitor.Plugin;
import com.getcapacitor.PluginCall;
import com.getcapacitor.PluginMethod;
import com.getcapacitor.annotation.CapacitorPlugin;
import java.io.File;
import java.io.FileReader;
import java.io.FileWriter;
import java.io.BufferedReader;
import java.io.BufferedWriter;

@CapacitorPlugin(name = "NativeStorage")
public class NativeStoragePlugin extends Plugin {

    private static final String TAG = "NativeStorage";
    private static final String CARPETA = "SegurApp";
    private static final String FILE = "datos.json";

    Archivo privado obtenerArchivoDeDatos() {
        // Guarda en Android/data/com.salvadormg.segurapp/files/SegurApp/datos.json
        Directorio de archivo = nuevo archivo (getContext().getExternalFilesDir(null), FOLDER);
        if (!dir.exists()) dir.mkdirs();
        devolver nuevo Archivo(dir, ARCHIVO);
    }

    Archivo privado obtenerArchivoDeDatosInterno() {
        // Backup en almacenamiento interno (no se borra con limpiar caché)
        Directorio de archivos = nuevo Archivo(getContext().getFilesDir(), CARPETA);
        if (!dir.exists()) dir.mkdirs();
        devolver nuevo Archivo(dir, ARCHIVO);
    }

    @PluginMethod
    public void save(PluginCall call) {
        String datos = llamada.getString("datos", "");
        booleano guardado = falso;

        // Guarda en ambas ubicaciones
        intentar {
            FileWriter fw = new FileWriter(getDataFile());
            BufferedWriter bw = nuevo BufferedWriter(fw);
            bw.write(datos);
            bw.close();
            guardado = verdadero;
        } catch (Exception e) {
            Log.e(TAG, "Error guardando en externo: " + e.getMessage());
        }

        intentar {
            FileWriter fw = new FileWriter(getDataFileInternal());
            BufferedWriter bw = nuevo BufferedWriter(fw);
            bw.write(datos);
            bw.close();
            guardado = verdadero;
        } catch (Exception e) {
            Log.e(TAG, "Error guardando en interno: " + e.getMessage());
        }

        si (guardado) {
            llamar.resolver();
        } demás {
            call.reject("No se pudo guardar");
        }
    }

    @PluginMethod
    public void load(PluginCall call) {
        // Intenta leer primero del externo, luego del interno
        Archivo[] archivos = { obtenerArchivoDeDatos(), obtenerArchivoDeDatosInterno() };

        para (Archivo f : archivos) {
            intentar {
                si (f.existe()) {
                    StringBuilder sb = nuevo StringBuilder();
                    BufferedReader br = new BufferedReader(new FileReader(f));
                    Línea de cadena;
                    mientras ((línea = br.readLine()) != null) sb.append(línea);
                    br.close();
                    com.getcapacitor.JSObject resultado = nuevo com.getcapacitor.JSObject();
                    resultado.put("datos", sb.toString());
                    llamar.resolver(resultado);
                    devolver;
                }
            } catch (Exception e) {
                Log.e(TAG, "Error leyendo: " + e.getMessage());
            }
        }

        // No hay datos aún (primera instalación)
        com.getcapacitor.JSObject resultado = nuevo com.getcapacitor.JSObject();
        resultado.put("datos", "");
        llamar.resolver(resultado);
    }
}
JAVA

          # MainActivity que registra el complemento y pide permisos
          gato > android/app/src/main/java/com/salvadormg/segurapp/MainActivity.java << 'JAVA'
paquete com.salvadormg.segurapp;

import android.os.Bundle;
importar android.Manifest;
import android.os.Build;
import android.webkit.WebView;
import androidx.core.app.ActivityCompat;
import com.getcapacitor.BridgeActivity;

clase pública MainActivity extiende BridgeActivity {

    @Anular
    public void onCreate(Bundle savedInstanceState) {
        registrarPlugin(NativeStoragePlugin.class);
        super.onCreate(savedInstanceState);
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
            ActivityCompat.requestPermissions(this, new String[]{
                Manifiesto.permiso.LEER_IMÁGENES_MEDIA,
                Manifiesto.permiso.LEER_VIDEO_MEDIA,
                Manifiesto.permiso.CÁMARA
            }, 100);
        } demás {
            ActivityCompat.requestPermissions(this, new String[]{
                Manifiesto.permiso.READ_EXTERNAL_STORAGE,
                Manifiesto.permiso.ESCRIBIR_ALMACENAMIENTO_EXTERNAL,
                Manifiesto.permiso.CÁMARA
            }, 100);
        }
    }

    @Anular
    protected void onStop() {
        // Se llama SIEMPRE antes de cerrar: botón atrás, gestor de tareas, apagar pantalla
        // Forzamos que el JS guarde antes de que Android mate el proceso
        intentar {
            getBridge().getWebView().evaluateJavascript(
                "try{const d=JSON.stringify(state);localStorage.setItem('segurapp8',d);" +
                "const ns=window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.NativeStorage;" +
                "if(ns)ns.save({data:d});}catch(e){}",
                nulo
            );
        } catch(Exception e) {}
        super.onStop();
    }

    @Anular
    public void onBackPressed() {
        moverTareaAlReverso(verdadero);
    }
}
